<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="main">
        <header class="header">
            <h1>Employee Management System</h1>
            <button class="create_employee">Add Employee</button>
        </header>
        <div class="employees">
            <div class="employees_name">
                <span class="employee_name_title"></span>
                <div class="employee_name_list"></div>
            </div>
            <div class="employee_single">
                <div class="employee_single_title">Employee Info</div>
                <div class="employee_single_info"></div>
            </div>
            <div class="add_employee">
                <form class="add_employee_create">
                    Add a new Employee
                    <div>
                        <input type="text" name="firstName" placeholder="First Name" required />
                        <input type="text" name="lastName" placeholder="Last Name" required />
                    </div>
                    <input type="text" name="imageUrl" placeholder="Image URL" />
                    <input type="email" name="email" placeholder="Email" required />
                    <input type="number" name="contactNumber" placeholder="Contact" required />
                    <input type="number" name="salary" placeholder="Salary" required />
                    <input type="text" name="address" placeholder="Address" required />
                    <input type="date" name="dob" placeholder="Date of Birth" class="addEmployee_create--dob"
                        required />
                    <input type="submit" class="addEmployee_create--submit" value="Submit">
                </form>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
